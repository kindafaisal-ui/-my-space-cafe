<!DOCTYPE html>

<title>My Space Cafe - Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif}
.wrap{width:900px}
.screen{width:900px;height:506px;background:#1a0e00;position:relative;overflow:hidden;border:2px solid rgba(245,200,66,0.4)}
.scene{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;pointer-events:none}
.scene.active{opacity:1;pointer-events:all}
.playbtn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:99;cursor:pointer;background:rgba(0,0,0,0.35);transition:opacity 0.4s}
.playbtn.hidden{opacity:0;pointer-events:none}
.playcircle{width:90px;height:90px;background:#f5c842;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s}
.playcircle:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(245,200,66,0.6)}
.tri{width:0;height:0;border-top:22px solid transparent;border-bottom:22px solid transparent;border-left:36px solid #1a0e00;margin-left:8px}
.prog{height:5px;background:rgba(245,200,66,0.15)}
.progfill{height:100%;background:#f5c842;width:0;transition:width 0.1s linear}
.dots{display:flex;justify-content:center;gap:12px;padding:18px 0;background:#0a0a0a}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(245,200,66,0.2);border:none;cursor:pointer;transition:all 0.3s}
.dot.active{background:#f5c842;transform:scale(1.4)}
@keyframes glowPulse{0%,100%{box-shadow:0 0 30px rgba(245,200,66,0.3),0 0 60px rgba(245,200,66,0.1)}50%{box-shadow:0 0 70px rgba(245,200,66,0.8),0 0 140px rgba(245,200,66,0.3)}}
</style>
</head>

<script>
let cur=0,playing=false,prog=0,timer=null;
const DUR=5200;

function showScene(i){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+i).classList.add("active");
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));
  document.querySelectorAll(".dot")[i].classList.add("active");
}


async function playWelcomeVoice() {
  try {
    const res = await fetch("/api/voice", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({text: "Welcome to My Space. Your name. Your seat. Your place. We have been waiting for you. We are opening soon."})
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    audio.play();
  } catch(e) { console.log("voice error", e); }
}

function startVideo(){
  document.getElementById("playBtn").classList.add("hidden"); playWelcomeVoice();
  playing=true; cur=0; prog=0;
  showScene(0); runProg();
}

function runProg(){
  clearInterval(timer); prog=0;
  timer=setInterval(()=>{
    prog+=100/(DUR/100);
    document.getElementById("pf").style.width=Math.min(prog,100)+"%";
    if(prog>=100){
      clearInterval(timer);
      if(cur<4){cur++;showScene(cur);runProg();}
      else{document.getElementById("playBtn").classList.remove("hidden");playing=false;}
    }
  },100);
}

function goTo(i){cur=i;prog=0;showScene(i);if(playing)runProg();}
</script>
